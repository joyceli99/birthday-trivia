<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>💎 Juliaaaa's Birthday Trivia</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@700&display=swap');
  :root {
    --pink-bg: #FFF0F7; --pink-hot: #D4537E; --pink-deep: #72243E;
    --pink-light: #FBEAF0; --pink-border: #F4C0D1;
    --diamond: #C8E8F8; --diamond-border: #85B7EB; --diamond-text: #0C447C;
    --champagne: #FAC775; --champagne-dark: #412402;
    --white: #ffffff; --text: #3a0f20; --text-muted: #993556;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--pink-bg); color: var(--text); min-height: 100vh; }

  .header { text-align: center; padding: 1.5rem 1rem 0.5rem; }
  .header-diamonds { font-size: 16px; letter-spacing: 6px; margin-bottom: 4px; color: var(--pink-hot); }
  .header h1 { font-family: 'Playfair Display', serif; font-size: clamp(22px, 4vw, 40px); color: var(--pink-deep); margin-bottom: 2px; }
  .header-sub { font-size: 12px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; }

  /* SCOREBOARD */
  .scoreboard { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; padding: 0.75rem 1rem 0.25rem; }
  .score-pill { background: var(--white); border: 1px solid var(--pink-border); border-radius: 99px; padding: 5px 14px; font-size: 13px; font-weight: 500; color: var(--pink-deep); display: flex; align-items: center; gap: 6px; }
  .score-pill.leader { background: var(--pink-hot); color: var(--white); border-color: var(--pink-hot); }
  .score-pill .pts { font-weight: 700; }
  .no-players { font-size: 13px; color: var(--text-muted); text-align: center; padding: 0.5rem; }

  /* BOARD */
  .board-wrap { padding: 0.5rem 0.75rem 1rem; max-width: 900px; margin: 0 auto; }
  .cat-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 6px; }
  .cat-header { background: var(--pink-hot); color: var(--white); border-radius: 8px; padding: 7px 4px; text-align: center; font-size: clamp(8px, 1.3vw, 11px); font-weight: 600; line-height: 1.3; }
  .tile-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 6px; }
  .tile { border-radius: 10px; height: clamp(50px, 7vw, 68px); display: flex; align-items: center; justify-content: center; font-size: clamp(14px, 2.2vw, 20px); font-weight: 700; cursor: pointer; border: 1.5px solid var(--pink-border); background: var(--white); color: var(--pink-deep); transition: transform 0.15s, box-shadow 0.15s; user-select: none; }
  .tile:hover:not(.used) { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(212,83,126,0.15); }
  .tile.used { opacity: 0.2; cursor: default; pointer-events: none; }
  .tile.flipping { animation: flip 0.35s ease forwards; }
  @keyframes flip { 0%{transform:rotateY(0)} 50%{transform:rotateY(90deg);opacity:0.3} 100%{transform:rotateY(0);opacity:1} }

  /* JOIN BANNER */
  .join-banner { text-align: center; padding: 0.25rem 1rem 0.5rem; font-size: 12px; color: var(--text-muted); }
  .join-banner a { color: var(--pink-hot); font-weight: 600; text-decoration: none; }

  /* MODAL */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(72,10,30,0.75); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--white); border-radius: 20px; padding: 1.75rem; max-width: 560px; width: 100%; border: 2px solid var(--pink-border); text-align: center; animation: popIn 0.2s ease; max-height: 90vh; overflow-y: auto; }
  @keyframes popIn { from{transform:scale(0.92);opacity:0} to{transform:scale(1);opacity:1} }

  .modal-type { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; color: var(--text-muted); }
  .modal-points-badge { display: inline-block; border-radius: 99px; padding: 4px 16px; font-size: 13px; font-weight: 600; margin-bottom: 12px; background: var(--pink-hot); color: var(--white); }
  .modal-points-badge.diamond { background: var(--diamond); color: var(--diamond-text); }
  .modal-points-badge.negative { background: var(--pink-deep); color: var(--white); }
  .modal-points-badge.champagne { background: var(--champagne); color: var(--champagne-dark); }

  .modal h2 { font-family: 'Playfair Display', serif; font-size: clamp(16px, 2.5vw, 22px); color: var(--pink-deep); margin-bottom: 10px; line-height: 1.3; }

  /* TIMER */
  .timer-wrap { margin: 12px 0; }
  .timer-ring { position: relative; width: 70px; height: 70px; margin: 0 auto 8px; }
  .timer-ring svg { transform: rotate(-90deg); }
  .timer-ring circle { fill: none; stroke-width: 5; }
  .timer-track { stroke: var(--pink-border); }
  .timer-fill { stroke: var(--pink-hot); stroke-dasharray: 188; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear, stroke 0.3s; stroke-linecap: round; }
  .timer-fill.urgent { stroke: #C0392B; }
  .timer-num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; color: var(--pink-deep); }
  .timer-status { font-size: 13px; color: var(--text-muted); }

  /* ANSWERS LIST */
  .answers-section { text-align: left; margin: 12px 0; }
  .answers-label { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; text-align: center; }
  .answer-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--pink-light); border: 1px solid var(--pink-border); border-radius: 10px; margin-bottom: 6px; cursor: pointer; transition: background 0.15s; }
  .answer-row:hover { background: var(--pink-border); }
  .answer-row.selected { background: #d4edda; border-color: #28a745; }
  .answer-row.selected .answer-check { background: #28a745; border-color: #28a745; color: white; }
  .answer-player { font-size: 13px; font-weight: 600; color: var(--pink-deep); min-width: 80px; }
  .answer-text { font-size: 14px; color: var(--text); flex: 1; }
  .answer-check { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--pink-border); display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; color: transparent; background: var(--white); transition: all 0.15s; }
  .no-answers { font-size: 13px; color: var(--text-muted); text-align: center; padding: 12px; }

  /* JULIA ANSWER */
  .julia-answer-wrap { margin: 10px 0; }
  .julia-answer-label { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
  .julia-answer-box { background: var(--pink-light); border: 1.5px solid var(--pink-hot); border-radius: 10px; padding: 10px 14px; font-size: 15px; font-weight: 600; color: var(--pink-deep); }

  /* CHAOS REVEAL */
  .chaos-reveal { background: var(--pink-deep); border-radius: 14px; padding: 1rem; margin: 10px 0; text-align: center; }
  .chaos-reveal-icon { font-size: 36px; margin-bottom: 6px; }
  .chaos-reveal-title { font-size: 16px; font-weight: 700; color: var(--white); margin-bottom: 4px; }
  .chaos-reveal-desc { font-size: 13px; color: #F4C0D1; line-height: 1.5; }

  /* CHAOS WINNER PICKER */
  .chaos-winner-wrap { margin: 10px 0; }
  .chaos-winner-label { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; text-align: center; }
  .chaos-winner-btns { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .chaos-winner-btn { background: var(--pink-light); border: 1.5px solid var(--pink-border); border-radius: 99px; padding: 7px 16px; font-size: 13px; font-weight: 500; color: var(--pink-deep); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.15s; }
  .chaos-winner-btn:hover { background: var(--pink-deep); color: var(--white); border-color: var(--pink-deep); }

  .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 14px; }
  .btn { border-radius: 99px; padding: 10px 24px; font-size: 14px; font-weight: 600; cursor: pointer; border: 1.5px solid var(--pink-border); font-family: 'DM Sans', sans-serif; transition: background 0.15s, transform 0.1s; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--pink-hot); color: var(--white); border-color: var(--pink-hot); }
  .btn-primary:hover { background: var(--pink-deep); border-color: var(--pink-deep); }
  .btn-ghost { background: transparent; color: var(--text-muted); }
  .btn-ghost:hover { background: var(--pink-light); }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--pink-deep); color: var(--white); border-radius: 99px; padding: 10px 24px; font-size: 14px; font-weight: 500; z-index: 200; transition: transform 0.3s ease; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="header">
  <div class="header-diamonds">💎 ✦ 💎 ✦ 💎</div>
  <h1>Juliaaaa's Birthday Trivia</h1>
  <div class="header-sub">Summer 2026</div>
</div>
<div class="join-banner">Players join at <a id="join-url" href="join.html">join.html</a></div>
<div class="scoreboard" id="scoreboard"><div class="no-players">Waiting for players to join…</div></div>
<div class="board-wrap">
  <div class="cat-row" id="cat-row"></div>
  <div id="board"></div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal" id="modal">
    <div class="modal-type" id="modal-type">Question</div>
    <div class="modal-points-badge" id="modal-points-badge">100 pts</div>
    <h2 id="modal-question"></h2>

    <!-- Timer -->
    <div class="timer-wrap" id="timer-wrap">
      <div class="timer-ring">
        <svg width="70" height="70" viewBox="0 0 70 70">
          <circle class="timer-track" cx="35" cy="35" r="30"/>
          <circle class="timer-fill" id="timer-fill" cx="35" cy="35" r="30"/>
        </svg>
        <div class="timer-num" id="timer-num">30</div>
      </div>
      <div class="timer-status" id="timer-status">Waiting for answers…</div>
    </div>

    <!-- Julia's answer (hidden until revealed) -->
    <div class="julia-answer-wrap" id="julia-answer-wrap" style="display:none">
      <div class="julia-answer-label">💎 Julia's answer</div>
      <div class="julia-answer-box" id="julia-answer-box"></div>
    </div>

    <!-- Player answers -->
    <div class="answers-section" id="answers-section" style="display:none">
      <div class="answers-label">Tap everyone who got it right</div>
      <div id="answers-list"></div>
    </div>

    <!-- Chaos reveal (shown after winner selected, if chaos tile) -->
    <div class="chaos-reveal" id="chaos-reveal" style="display:none">
      <div class="chaos-reveal-icon" id="chaos-icon"></div>
      <div class="chaos-reveal-title" id="chaos-title"></div>
      <div class="chaos-reveal-desc" id="chaos-desc"></div>
    </div>

    <!-- Chaos winner picker -->
    <div class="chaos-winner-wrap" id="chaos-winner-wrap" style="display:none">
      <div class="chaos-winner-label">Who gets the chaos power?</div>
      <div class="chaos-winner-btns" id="chaos-winner-btns"></div>
    </div>

    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeModal()">Close</button>
      <button class="btn btn-primary" id="modal-action-btn" onclick="modalAction()">Reveal answer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, update, get, set, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAVXP3XwOLCnu1avcZ1owXIGsSD6Hak_wc",
  authDomain: "juliaaaa-birthday.firebaseapp.com",
  databaseURL: "https://juliaaaa-birthday-default-rtdb.firebaseio.com",
  projectId: "juliaaaa-birthday",
  storageBucket: "juliaaaa-birthday.firebasestorage.app",
  messagingSenderId: "915123861864",
  appId: "1:915123861864:web:6552d851e2d411a44b7edd"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const CATEGORIES = ["Would Julia Rather","Julia or a Friend?","Julia's Hot Takes","Baby Julia","Global Politics"];
const POINTS = [100,200,300,400,500];

const QUESTIONS = [
  [
    {q:"Would Julia rather spend a weekend camping in the wild with no phone, or at a luxury hotel alone with no friends?",a:"wjr_100"},
    {q:"Would Julia rather eat the same meal every day for a year, or never eat her favorite food again?",a:"wjr_200"},
    {q:"Would Julia rather always speak in rhymes, or always sing instead of talk?",a:"wjr_300"},
    {q:"Would Julia rather know how she dies, or know when she dies?",a:"wjr_400"},
    {q:"Would Julia rather have unlimited money but no friends, or be broke but surrounded by her favorite people?",a:"wjr_500"},
  ],
  [
    {q:"Who once got lost trying to find the bathroom at a party and ended up outside — Julia or a friend?",a:"jof_100"},
    {q:"Who cried at a commercial for a fast food chain — Julia or a friend?",a:"jof_200"},
    {q:"Who has a Pinterest board with over 2,000 pins — Julia or a friend?",a:"jof_300"},
    {q:"Who once texted the wrong person something extremely embarrassing — Julia or a friend?",a:"jof_400"},
    {q:"Who once convinced the group to take a detour that added 2 hours to a road trip — Julia or a friend?",a:"jof_500"},
  ],
  [
    {q:"What is Julia's hot take on pineapple on pizza?",a:"jht_100"},
    {q:"What does Julia think about people who don't text back within an hour?",a:"jht_200"},
    {q:"What is Julia's most controversial opinion about a popular TV show or movie?",a:"jht_300"},
    {q:"What does Julia think is the most overrated travel destination?",a:"jht_400"},
    {q:"What is Julia's spiciest opinion about dating in 2026?",a:"jht_500"},
  ],
  [
    {q:"How many siblings does Julia have?",a:"bj_100"},
    {q:"What was Julia's first job ever?",a:"bj_200"},
    {q:"What did young Julia want to be when she grew up?",a:"bj_300"},
    {q:"What was Julia's most embarrassing phase growing up?",a:"bj_400"},
    {q:"What is something Julia did as a kid that she is still not over?",a:"bj_500"},
  ],
  [
    {q:"Which world leader does Julia think would be the most chaotic dinner guest?",a:"gp_100"},
    {q:"If Julia were president for a day, what is the first law she would pass?",a:"gp_200"},
    {q:"Which country does Julia think has the best approach to work-life balance?",a:"gp_300"},
    {q:"If Julia had to explain a current geopolitical conflict using a reality TV show, which show?",a:"gp_400"},
    {q:"What does Julia think is the most underrated country in the world?",a:"gp_500"},
  ],
];

const CHAOS_TILES = [
  {type:"sip",icon:"🍹",title:"Sip to earn",desc:"Winner takes a sip and banks an extra 300 points.",bonus:300},
  {type:"sip",icon:"🍹",title:"Sip to earn",desc:"Winner takes a sip and banks an extra 300 points.",bonus:300},
  {type:"sip",icon:"🍹",title:"Sip to earn",desc:"Winner takes a sip and banks an extra 300 points.",bonus:300},
  {type:"pick",icon:"🎁",title:"Bonus points",desc:"Lucky you! Automatically bank +100 bonus points.",bonus:100},
  {type:"pick",icon:"🎁",title:"Bonus points",desc:"Lucky you! Automatically bank +100 bonus points.",bonus:100},
  {type:"pick",icon:"🎁",title:"Bonus points",desc:"Lucky you! Automatically bank +100 bonus points.",bonus:100},
  {type:"steal",icon:"🔄",title:"Steal",desc:"Winner steals 200 points from any player of their choice.",bonus:0},
  {type:"steal",icon:"🔄",title:"Steal",desc:"Winner steals 200 points from any player of their choice.",bonus:0},
  {type:"sabotage",icon:"💀",title:"Sabotage",desc:"Winner picks someone to lose 200 points.",bonus:0},
  {type:"doubledown",icon:"🎯",title:"Double down",desc:"Winner's points are doubled for this tile.",bonus:0},
  {type:"swap",icon:"🔀",title:"Score swap",desc:"Winner swaps scores with the player in last place.",bonus:0},
  {type:"birthday",icon:"🎂",title:"Birthday girl bonus",desc:"Everyone who matched Julia's answer gets 500 bonus points.",bonus:500},
];

const MULTIPLIERS = [1,1,1,1,1,1,1,2,2,3,-1,1,1];

function buildLayout() {
  // Force rebuild if old layout doesn't have question on chaos tiles
  const saved = localStorage.getItem('julia-board-layout');
  if (saved) {
    const parsed = JSON.parse(saved);
    const chaosWithoutQ = parsed.find(t => t.isChaos && !t.question);
    if (!chaosWithoutQ) return parsed;
    localStorage.removeItem('julia-board-layout'); // stale — rebuild
  }

  // Build all 25 question slots: col=category, row=point level
  const allSlots = [];
  for(let r=0;r<5;r++) for(let c=0;c<5;c++) allSlots.push({row:r,col:c});

  // Pick 12 chaos positions (avoid row 0 so 100-pt row is always safe)
  const eligible = allSlots.filter(p=>p.row>0);
  const chaosPositions = new Set(
    eligible.sort(()=>Math.random()-0.5).slice(0,12).map(p=>`${p.row}-${p.col}`)
  );

  let ci=0, mi=0;
  const layout=[];
  for(let r=0;r<5;r++) for(let c=0;c<5;c++) {
    const key=`${r}-${c}`;
    const question = QUESTIONS[c][r]; // always assign the question
    const points = POINTS[r];
    if(chaosPositions.has(key)) {
      // Chaos tile: still has a trivia question + a hidden chaos bonus
      layout.push({isChaos:true, chaos:CHAOS_TILES[ci++], question, points, row:r, col:c});
    } else {
      layout.push({isChaos:false, question, points, multiplier:MULTIPLIERS[mi++], row:r, col:c});
    }
  }
  localStorage.setItem('julia-board-layout',JSON.stringify(layout));
  return layout;
}

const layout = buildLayout();
let juliaAnswers = {};
let players = {};
let currentTile = null;
let timerInterval = null;
let timerSeconds = 30;
let selectedWinners = new Set();
let modalStep = 'timer'; // timer | reveal | award | chaos-pick | done

get(ref(db,'julia-answers')).then(s=>{ if(s.exists()) juliaAnswers=s.val(); });
onValue(ref(db,'players'), s=>{ players=s.exists()?s.val():{}; renderScoreboard(); if(currentTile) renderAnswersList(); });

function renderScoreboard() {
  const el = document.getElementById('scoreboard');
  const list = Object.values(players).sort((a,b)=>b.score-a.score);
  if(!list.length){ el.innerHTML='<div class="no-players">Waiting for players to join…</div>'; return; }
  el.innerHTML = list.map((p,i)=>
    `<div class="score-pill ${i===0?'leader':''}">
      ${i===0?'👑 ':''}${p.name} <span class="pts">${p.score}</span>
    </div>`).join('');
}

function renderBoard() {
  document.getElementById('cat-row').innerHTML = CATEGORIES.map(c=>`<div class="cat-header">${c}</div>`).join('');
  const board = document.getElementById('board');
  board.innerHTML='';
  for(let r=0;r<5;r++){
    const row=document.createElement('div'); row.className='tile-row';
    for(let c=0;c<5;c++){
      const tile=layout.find(t=>t.row===r&&t.col===c);
      const idx=r*5+c;
      const used=localStorage.getItem(`tile-used-${idx}`);
      const el=document.createElement('div');
      el.className='tile'+(used?' used':'');
      el.dataset.idx=idx;
      el.textContent=used?'✓':POINTS[r];
      el.onclick=()=>flipTile(idx,tile,el);
      row.appendChild(el);
    }
    board.appendChild(row);
  }
}

function flipTile(idx,tile,el) {
  if(el.classList.contains('used')) return;
  el.classList.add('flipping');
  setTimeout(()=>{ el.classList.remove('flipping'); openModal(idx,tile,el); },350);
}

function openModal(idx,tile,el) {
  currentTile={idx,tile,el};
  selectedWinners.clear();
  modalStep='timer';

  // Clear any previous round answers
  remove(ref(db,'round-answers'));
  set(ref(db,'round-active'),true);

  const pts = tile.isChaos ? tile.points : tile.points*(tile.multiplier||1);
  const badge = document.getElementById('modal-points-badge');
  badge.className='modal-points-badge'+((!tile.isChaos && tile.multiplier>1)?' diamond':(!tile.isChaos && tile.multiplier<0)?' negative':'');
  badge.textContent = tile.isChaos ? `${pts} pts + 🎲 chaos hidden` : `${pts>0?'+':''}${pts} pts`;

  document.getElementById('modal-type').textContent = tile.isChaos ? 'Question + Hidden Chaos' : 'Trivia';
  // Always show the trivia question — chaos is revealed AFTER answering
  document.getElementById('modal-question').textContent = tile.question?.q || '(question missing)';

  document.getElementById('timer-wrap').style.display='block';
  document.getElementById('julia-answer-wrap').style.display='none';
  document.getElementById('answers-section').style.display='none';
  document.getElementById('chaos-reveal').style.display='none';
  document.getElementById('chaos-winner-wrap').style.display='none';
  document.getElementById('modal-action-btn').textContent='Reveal answer';
  document.getElementById('modal-action-btn').disabled=false;

  document.getElementById('modal-bg').classList.add('open');
  startTimer();
}

function startTimer() {
  timerSeconds=30;
  updateTimerDisplay();
  timerInterval=setInterval(()=>{
    timerSeconds--;
    updateTimerDisplay();
    if(timerSeconds<=0){ clearInterval(timerInterval); timerDone(); }
  },1000);
}

function updateTimerDisplay() {
  const fill=document.getElementById('timer-fill');
  const num=document.getElementById('timer-num');
  const offset=188*(1-timerSeconds/30);
  fill.style.strokeDashoffset=offset;
  fill.classList.toggle('urgent',timerSeconds<=10);
  num.textContent=timerSeconds;
  document.getElementById('timer-status').textContent=timerSeconds>0?'Answering on their phones…':'Time\'s up!';
}

function timerDone() {
  set(ref(db,'round-active'),false);
  document.getElementById('timer-wrap').style.display='none';

  // Show question text properly if it was hidden for chaos
  const tile = currentTile.tile;
  if(tile.isChaos) {
    // We still show the question - we just reveal chaos AFTER scoring
    document.getElementById('modal-question').textContent = tile.question ? tile.question.q : tile.chaos.title;
  }

  // Show Julia's answer
  const answerKey = tile.isChaos && tile.question ? tile.question.a : tile.question?.a;
  if(answerKey) {
    const answer = juliaAnswers[answerKey]||(tile.isChaos?'(no answer yet)':'(no answer yet)');
    document.getElementById('julia-answer-box').textContent=answer;
    document.getElementById('julia-answer-wrap').style.display='block';
  }

  renderAnswersList();
  document.getElementById('answers-section').style.display='block';
  document.getElementById('modal-action-btn').textContent='Award points to selected';
  modalStep='award';
}

function renderAnswersList() {
  const list=document.getElementById('answers-list');
  const submissions=Object.values(players).filter(p=>p.roundAnswer);
  if(!submissions.length){ list.innerHTML='<div class="no-answers">No answers submitted yet</div>'; return; }
  list.innerHTML=submissions.map(p=>{
    const pid=Object.keys(players).find(k=>players[k].name===p.name);
    const sel=selectedWinners.has(pid);
    return `<div class="answer-row ${sel?'selected':''}" onclick="toggleWinner('${pid}')">
      <span class="answer-player">${p.name}</span>
      <span class="answer-text">${p.roundAnswer||'—'}</span>
      <div class="answer-check">${sel?'✓':''}</div>
    </div>`;
  }).join('');
}

window.toggleWinner=function(pid) {
  if(selectedWinners.has(pid)) selectedWinners.delete(pid);
  else selectedWinners.add(pid);
  renderAnswersList();
};

window.modalAction=function() {
  if(modalStep==='timer') {
    clearInterval(timerInterval);
    timerDone();
  } else if(modalStep==='award') {
    awardSelectedWinners();
  } else if(modalStep==='done') {
    markUsed(currentTile.idx);
    closeModal();
  }
};

async function awardSelectedWinners() {
  const tile = currentTile.tile;
  const pts = tile.isChaos ? tile.points : tile.points * (tile.multiplier || 1);

  // Award base trivia points to all winners
  for(const pid of selectedWinners) {
    const p = players[pid];
    if(!p) continue;
    await update(ref(db,`players/${pid}`), {score: Math.max(0,(p.score||0)+pts), roundAnswer:null});
  }
  // Clear round answers for non-winners
  for(const pid of Object.keys(players)) {
    if(!selectedWinners.has(pid)) await update(ref(db,`players/${pid}`),{roundAnswer:null});
  }

  if(!selectedWinners.size) {
    showToast('No winners this round');
    document.getElementById('modal-action-btn').textContent='Close';
    modalStep='done';
    return;
  }

  showToast(`+${pts} pts to ${selectedWinners.size} player(s)`);

  if(tile.isChaos) {
    // Reveal the chaos card
    document.getElementById('chaos-icon').textContent = tile.chaos.icon;
    document.getElementById('chaos-title').textContent = tile.chaos.title;
    document.getElementById('chaos-desc').textContent = tile.chaos.desc;
    document.getElementById('chaos-reveal').style.display = 'block';
    // Always show multi-select checklist first, then execute
    showChaosWinnerSelect(tile.chaos);
  } else {
    document.getElementById('modal-action-btn').textContent = 'Close';
    modalStep = 'done';
  }
}

// Show multi-select checklist of winners — host picks who gets chaos power, then confirms
function showChaosWinnerSelect(chaos) {
  const wrap = document.getElementById('chaos-winner-wrap');
  const lbl = document.getElementById('chaos-winner-label');
  const btns = document.getElementById('chaos-winner-btns');
  const actionBtn = document.getElementById('modal-action-btn');
  wrap.style.display = 'block';
  actionBtn.disabled = true;
  modalStep = 'chaos-pick';
  window._chaosSelected = new Set();
  window._chaosType = chaos;

  const render = () => {
    lbl.textContent = `Who gets the chaos power? Select all that apply.`;
    btns.innerHTML = [...selectedWinners].map(pid => {
      const sel = window._chaosSelected.has(pid);
      return `<button class="chaos-winner-btn"
        style="${sel ? 'background:var(--pink-hot);color:#fff;border-color:var(--pink-hot);' : ''}"
        onclick="toggleChaosSelect('${pid}')">${players[pid]?.name}${sel ? ' ✅' : ''}</button>`;
    }).join('');
    btns.innerHTML += `<button class="chaos-winner-btn"
      style="margin-top:8px;background:var(--pink-deep);color:#fff;border-color:var(--pink-deep);width:100%"
      onclick="confirmChaosSelect()">✅ Confirm selection</button>`;
  };
  render();
  window._renderChaosSelect = render;
}

window.toggleChaosSelect = function(pid) {
  if(!window._chaosSelected) return;
  if(window._chaosSelected.has(pid)) window._chaosSelected.delete(pid);
  else window._chaosSelected.add(pid);
  if(window._renderChaosSelect) window._renderChaosSelect();
};

window.confirmChaosSelect = async function() {
  const chaos = window._chaosType;
  const chosenWinners = [...(window._chaosSelected || [])];
  window._chaosSelected = null;
  window._renderChaosSelect = null;
  window._chaosType = null;
  hidePicker();
  if(!chosenWinners.length) {
    showToast('No one selected — skipping chaos');
    document.getElementById('modal-action-btn').textContent = 'Close';
    modalStep = 'done';
    return;
  }
  await executeChaosForAll(chosenWinners, chaos);
};

// Execute chaos for an array of winners, sequentially for actions needing per-winner interaction
async function executeChaosForAll(winnerIds, chaos) {
  switch(chaos.type) {

    case 'sip': {
      // All chosen winners sip — confirm each one, award +bonus each
      const sipConfirmed = new Set();
      const wrap = document.getElementById('chaos-winner-wrap');
      const lbl = document.getElementById('chaos-winner-label');
      const btns = document.getElementById('chaos-winner-btns');
      wrap.style.display = 'block';
      document.getElementById('modal-action-btn').disabled = true;
      modalStep = 'chaos-pick';
      const render = () => {
        lbl.textContent = '🍹 Confirm who sipped:';
        btns.innerHTML = winnerIds.map(pid => {
          const confirmed = sipConfirmed.has(pid);
          return `<button class="chaos-winner-btn"
            style="${confirmed ? 'background:var(--pink-hot);color:#fff;border-color:var(--pink-hot);' : ''}"
            onclick="toggleSipConfirm('${pid}')">${players[pid]?.name}${confirmed ? ' ✅ sipped' : ' — tap to confirm'}</button>`;
        }).join('');
        btns.innerHTML += `<button class="chaos-winner-btn"
          style="margin-top:8px;background:var(--pink-deep);color:#fff;border-color:var(--pink-deep);width:100%"
          onclick="finalizeSips(${chaos.bonus})">✅ Award sip points</button>`;
      };
      render();
      window._sipConfirmed = sipConfirmed;
      window._renderSipConfirm = render;
      break;
    }

    case 'pick': {
      // Auto: all chosen winners get +100 bonus instantly
      for(const pid of winnerIds) {
        await update(ref(db,`players/${pid}`), {score: Math.max(0,(players[pid]?.score||0)+chaos.bonus)});
      }
      showToast(`🎁 ${winnerIds.map(p=>players[p]?.name).join(', ')} each get +${chaos.bonus} pts!`);
      document.getElementById('modal-action-btn').textContent = 'Close';
      modalStep = 'done';
      break;
    }

    case 'steal': {
      // Each winner picks someone to steal from, sequentially
      stealLoop(winnerIds, 0);
      break;
    }

    case 'sabotage': {
      // Each winner picks someone to sabotage, sequentially
      sabotageLoop(winnerIds, 0);
      break;
    }

    case 'doubledown': {
      // All chosen winners get their tile points doubled
      const tile = currentTile.tile;
      const bonusPts = tile.points * (tile.multiplier||1);
      for(const pid of winnerIds) {
        await update(ref(db,`players/${pid}`), {score: Math.max(0,(players[pid]?.score||0)+bonusPts)});
      }
      showToast(`🎯 ${winnerIds.map(p=>players[p]?.name).join(', ')} doubled! +${bonusPts} each`);
      document.getElementById('modal-action-btn').textContent = 'Close';
      modalStep = 'done';
      break;
    }

    case 'swap': {
      // Animate swaps sequentially, each winner swaps with current last place
      if(Object.keys(players).length < 2) {
        showToast('Not enough players!');
        document.getElementById('modal-action-btn').textContent = 'Close';
        modalStep = 'done';
        break;
      }
      await animateSwaps(winnerIds, 0);
      break;
    }

    case 'birthday': {
      // All chosen winners get +500
      for(const pid of winnerIds) {
        await update(ref(db,`players/${pid}`), {score: Math.max(0,(players[pid]?.score||0)+500)});
      }
      showToast(`🎂 Birthday bonus! ${winnerIds.map(p=>players[p]?.name).join(', ')} each get +500!`);
      document.getElementById('modal-action-btn').textContent = 'Close';
      modalStep = 'done';
      break;
    }

    default:
      document.getElementById('modal-action-btn').textContent = 'Close';
      modalStep = 'done';
  }
}

// Sip confirm toggles
window.toggleSipConfirm = function(pid) {
  if(!window._sipConfirmed) return;
  if(window._sipConfirmed.has(pid)) window._sipConfirmed.delete(pid);
  else window._sipConfirmed.add(pid);
  if(window._renderSipConfirm) window._renderSipConfirm();
};

window.finalizeSips = async function(bonus) {
  const confirmed = window._sipConfirmed || new Set();
  for(const pid of confirmed) {
    await update(ref(db,`players/${pid}`), {score: Math.max(0,(players[pid]?.score||0)+bonus)});
  }
  showToast(confirmed.size ? `🍹 ${[...confirmed].map(p=>players[p]?.name).join(', ')} sipped! +${bonus} each` : 'No one sipped');
  window._sipConfirmed = null;
  window._renderSipConfirm = null;
  hidePicker();
  document.getElementById('modal-action-btn').textContent = 'Close';
  modalStep = 'done';
};

// Steal loop — each winner picks a victim sequentially
function stealLoop(winnerIds, index) {
  if(index >= winnerIds.length) {
    hidePicker();
    document.getElementById('modal-action-btn').textContent = 'Close';
    modalStep = 'done';
    return;
  }
  const pid = winnerIds[index];
  const name = players[pid]?.name;
  const others = Object.entries(players).filter(([id]) => id !== pid);
  renderPlayerPicker(
    `🔄 ${name} steals 200 pts from: (${index+1} of ${winnerIds.length})`,
    others,
    async (targetId) => {
      const target = players[targetId];
      const stolen = Math.min(200, target.score||0);
      await update(ref(db,`players/${targetId}`), {score: Math.max(0,(target.score||0)-stolen)});
      await update(ref(db,`players/${pid}`), {score: Math.max(0,(players[pid]?.score||0)+stolen)});
      showToast(`${name} stole ${stolen} pts from ${target.name}!`);
      hidePicker();
      stealLoop(winnerIds, index+1);
    }
  );
}

// Sabotage loop — each winner picks a victim sequentially
function sabotageLoop(winnerIds, index) {
  if(index >= winnerIds.length) {
    hidePicker();
    document.getElementById('modal-action-btn').textContent = 'Close';
    modalStep = 'done';
    return;
  }
  const pid = winnerIds[index];
  const name = players[pid]?.name;
  const others = Object.entries(players).filter(([id]) => id !== pid);
  renderPlayerPicker(
    `💀 ${name} sabotages (−200 pts): (${index+1} of ${winnerIds.length})`,
    others,
    async (targetId) => {
      const target = players[targetId];
      await update(ref(db,`players/${targetId}`), {score: Math.max(0,(target.score||0)-200)});
      showToast(`${target.name} loses 200 pts 💀`);
      hidePicker();
      sabotageLoop(winnerIds, index+1);
    }
  );
}

// Swap animation — each winner swaps with current last place, with toast drama
async function animateSwaps(winnerIds, index) {
  if(index >= winnerIds.length) {
    document.getElementById('modal-action-btn').textContent = 'Close';
    modalStep = 'done';
    return;
  }
  const pid = winnerIds[index];
  const name = players[pid]?.name;
  // Recalculate last place fresh each time (previous swap may have changed it)
  const sorted = Object.entries(players).sort((a,b) => b[1].score - a[1].score);
  const lastId = sorted[sorted.length-1][0];
  if(lastId === pid) {
    showToast(`${name} is already last — no swap! 😅`);
    await new Promise(r => setTimeout(r, 1200));
  } else {
    const lastScore = players[lastId]?.score||0;
    const winScore = players[pid]?.score||0;
    await update(ref(db,`players/${pid}`), {score: lastScore});
    await update(ref(db,`players/${lastId}`), {score: winScore});
    showToast(`🔀 ${name} ↔ ${players[lastId]?.name} swapped!`);
    await new Promise(r => setTimeout(r, 1500));
  }
  await animateSwaps(winnerIds, index+1);
}

// Show a single confirm button (for sip / pick victim drink confirmation)
function showConfirmBtn(label, btnText, onConfirm) {
  const wrap = document.getElementById('chaos-winner-wrap');
  const lbl = document.getElementById('chaos-winner-label');
  const btns = document.getElementById('chaos-winner-btns');
  if(!wrap||!lbl||!btns) return;
  lbl.textContent = label;
  btns.innerHTML = `<button class="chaos-winner-btn" style="background:var(--pink-hot);color:#fff;border-color:var(--pink-hot);" onclick="chaosConfirmAction()">${btnText}</button>`;
  wrap.style.display = 'block';
  document.getElementById('modal-action-btn').disabled = true;
  modalStep = 'chaos-pick';
  window._chaosConfirmCallback = onConfirm;
}

window.chaosConfirmAction = function() { if(window._chaosConfirmCallback) window._chaosConfirmCallback(); };

// Player picker UI (rendered inside chaos-winner-wrap)
function renderPlayerPicker(label, playerEntries, onPick) {
  const wrap = document.getElementById('chaos-winner-wrap');
  const btns = document.getElementById('chaos-winner-btns');
  const lbl = document.getElementById('chaos-winner-label');
  const actionBtn = document.getElementById('modal-action-btn');
  if(!wrap || !btns || !lbl) { console.error('Picker elements missing'); return; }
  lbl.textContent = label;
  if(!playerEntries.length) {
    btns.innerHTML = '<div style="font-size:13px;color:#F4C0D1;text-align:center">No other players to pick from!</div>';
  } else {
    btns.innerHTML = playerEntries.map(([pid,p]) =>
      `<button class="chaos-winner-btn" onclick="chaosPickTarget('${pid}')">${p.name}</button>`
    ).join('');
  }
  wrap.style.display = 'block';
  if(actionBtn) actionBtn.disabled = true;
  window._chaosPickCallback = onPick;
}

window.chaosPickTarget = function(pid) { if(window._chaosPickCallback) window._chaosPickCallback(pid); };
function hidePicker() {
  document.getElementById('chaos-winner-wrap').style.display = 'none';
  document.getElementById('modal-action-btn').disabled = false;
  window._chaosPickCallback = null;
}

window.confirmSip = async function(winnerId, bonus) {
  const winner = players[winnerId];
  await update(ref(db,`players/${winnerId}`), {score: Math.max(0,(winner?.score||0)+bonus)});
  showToast(`${winner?.name} sipped! +${bonus} pts banked 🍹`);
  hidePicker();
  document.getElementById('modal-action-btn').textContent = 'Close';
  modalStep = 'done';
};

function markUsed(idx) {
  localStorage.setItem(`tile-used-${idx}`,'1');
  const el=document.querySelector(`[data-idx="${idx}"]`);
  if(el){ el.classList.add('used'); el.textContent='✓'; }
}

window.closeModal=function() {
  clearInterval(timerInterval);
  set(ref(db,'round-active'),false);
  // Clear round answers
  Object.keys(players).forEach(pid=>update(ref(db,`players/${pid}`),{roundAnswer:null}));
  document.getElementById('modal-bg').classList.remove('open');
  currentTile=null;
  selectedWinners.clear();
  if(currentTile?.idx!==undefined) markUsed(currentTile.idx);
};

// Close also marks tile used
const origClose=window.closeModal;
window.closeModal=function(){
  if(currentTile) markUsed(currentTile.idx);
  clearInterval(timerInterval);
  set(ref(db,'round-active'),false);
  Object.keys(players).forEach(pid=>update(ref(db,`players/${pid}`),{roundAnswer:null}));
  document.getElementById('modal-bg').classList.remove('open');
  currentTile=null;
  selectedWinners.clear();
};

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// Set join URL
const base=window.location.href.replace('index.html','').replace(/\/$/,'');
document.getElementById('join-url').href='join.html';
document.getElementById('join-url').textContent=base+'/join.html';

renderBoard();
</script>
